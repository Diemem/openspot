name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Run tests and code analysis
  test:
    name: Run Tests & Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze
      
      - name: Check formatting
        run: dart format --set-exit-if-changed .
      
      - name: Run tests
        run: flutter test

  # Job 2: Build staging APK
  build-staging:
    name: Build Staging APK
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build staging APK
        run: flutter build apk -t lib/main_staging.dart
      
      - name: Upload staging APK
        uses: actions/upload-artifact@v3
        with:
          name: staging-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Job 3: Build production artifacts
  build-production:
    name: Build Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build production APK
        run: flutter build apk -t lib/main_production.dart --release
      
      - name: Build App Bundle
        run: flutter build appbundle -t lib/main_production.dart --release
      
      - name: Upload production APK
        uses: actions/upload-artifact@v3
        with:
          name: production-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
      
      - name: Upload App Bundle
        uses: actions/upload-artifact@v3
        with:
          name: production-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
